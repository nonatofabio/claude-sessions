<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1f6feb;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0d1117;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#58a6ff;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#58a6ff;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <!-- Terminal window -->
  <rect x="48" y="64" width="416" height="384" rx="24" fill="#0d1117" stroke="#30363d" stroke-width="3"/>

  <!-- Title bar -->
  <rect x="48" y="64" width="416" height="48" rx="24" fill="#161b22"/>
  <rect x="48" y="88" width="416" height="24" fill="#161b22"/>
  <!-- Traffic lights -->
  <circle cx="84" cy="88" r="8" fill="#f85149"/>
  <circle cx="112" cy="88" r="8" fill="#d29922"/>
  <circle cx="140" cy="88" r="8" fill="#3fb950"/>

  <!-- Session list lines (left pane) -->
  <rect x="72" y="136" width="160" height="2" rx="1" fill="#30363d"/>

  <!-- Active session dot + line -->
  <circle cx="84" cy="168" r="6" fill="#3fb950"/>
  <rect x="100" y="165" width="120" height="6" rx="3" fill="#c9d1d9"/>

  <!-- Idle session dot + line -->
  <circle cx="84" cy="196" r="6" fill="#484f58"/>
  <rect x="100" y="193" width="100" height="6" rx="3" fill="#8b949e"/>

  <!-- Idle session dot + line -->
  <circle cx="84" cy="224" r="6" fill="#484f58"/>
  <rect x="100" y="221" width="112" height="6" rx="3" fill="#8b949e"/>

  <!-- Group header -->
  <rect x="72" y="256" width="160" height="2" rx="1" fill="#30363d"/>

  <!-- Idle session dot + line -->
  <circle cx="84" cy="280" r="6" fill="#484f58"/>
  <rect x="100" y="277" width="90" height="6" rx="3" fill="#8b949e"/>

  <!-- Idle session dot + line -->
  <circle cx="84" cy="308" r="6" fill="#484f58"/>
  <rect x="100" y="305" width="108" height="6" rx="3" fill="#8b949e"/>

  <!-- Divider -->
  <rect x="248" y="130" width="2" height="296" fill="#30363d"/>

  <!-- Detail pane -->
  <rect x="272" y="136" width="168" height="10" rx="5" fill="#f0f6fc"/>
  <rect x="272" y="160" width="140" height="6" rx="3" fill="#8b949e"/>
  <rect x="272" y="176" width="120" height="6" rx="3" fill="#8b949e"/>

  <!-- Tags -->
  <rect x="272" y="200" width="48" height="16" rx="8" fill="#23863522" stroke="#23863544" stroke-width="1"/>
  <rect x="328" y="200" width="56" height="16" rx="8" fill="#1f6feb22" stroke="#1f6feb44" stroke-width="1"/>
  <rect x="392" y="200" width="44" height="16" rx="8" fill="#c9820022" stroke="#c9820044" stroke-width="1"/>

  <!-- Prompt lines -->
  <rect x="272" y="236" width="160" height="2" rx="1" fill="#30363d"/>
  <rect x="272" y="250" width="2" height="20" fill="#3fb950"/>
  <rect x="282" y="252" width="148" height="6" rx="3" fill="#8b949e" opacity="0.7"/>
  <rect x="282" y="264" width="120" height="6" rx="3" fill="#8b949e" opacity="0.5"/>

  <rect x="272" y="282" width="2" height="20" fill="#f85149"/>
  <rect x="282" y="284" width="130" height="6" rx="3" fill="#8b949e" opacity="0.7"/>
  <rect x="282" y="296" width="100" height="6" rx="3" fill="#8b949e" opacity="0.5"/>

  <rect x="272" y="314" width="2" height="20" fill="#30363d"/>
  <rect x="282" y="316" width="155" height="6" rx="3" fill="#8b949e" opacity="0.7"/>
  <rect x="282" y="328" width="110" height="6" rx="3" fill="#8b949e" opacity="0.5"/>

  <!-- Search icon overlay (magnifying glass) -->
  <g transform="translate(380, 72)" opacity="0.9">
    <circle cx="0" cy="0" r="14" fill="none" stroke="#58a6ff" stroke-width="3"/>
    <line x1="10" y1="10" x2="20" y2="20" stroke="#58a6ff" stroke-width="3" stroke-linecap="round"/>
  </g>
</svg>
